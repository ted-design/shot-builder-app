name: ui-checks
on:
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Firebase emulator mode
      VITE_USE_FIREBASE_EMULATORS: 1
      PLAYWRIGHT_BASE_URL: http://localhost:4173

      # Firebase configuration for emulator testing
      # Use 'demo-test' to match the emulator project ID
      # NOTE: Requires GitHub Secret 'FIREBASE_TEST_API_KEY' with valid Firebase API key
      # Even with emulators, browser-side Firebase SDK needs a valid API key to prevent Installations service errors
      VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_TEST_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: demo-test.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: demo-test
      VITE_FIREBASE_STORAGE_BUCKET: demo-test.appspot.com
      VITE_FIREBASE_MESSAGING_SENDER_ID: 123456789
      VITE_FIREBASE_APP_ID: 1:123456789:web:abcdef123456
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci || yarn install --frozen-lockfile || pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase Emulators
        run: |
          firebase emulators:start --only auth,firestore,storage --project demo-test &
          EMULATOR_PID=$!
          # Wait for Auth emulator (port 9099) — fail if not ready in 60s
          echo "Waiting for Auth emulator on port 9099..."
          timeout 60 bash -c 'until curl -sf http://localhost:9099/ > /dev/null 2>&1; do sleep 2; done'
          echo "Auth emulator ready"
          # Wait for Firestore emulator (port 8080)
          echo "Waiting for Firestore emulator on port 8080..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080/ > /dev/null 2>&1; do sleep 2; done'
          echo "Firestore emulator ready"
          # Wait for Storage emulator (port 9199). NOTE: the Storage emulator has
          # NO GET / route (it 404s), unlike auth/firestore which 200 at / — so
          # probe the bucket-list route /b, which returns 200 once it's ready.
          echo "Waiting for Storage emulator on port 9199..."
          timeout 60 bash -c 'until curl -sf http://localhost:9199/b > /dev/null 2>&1; do sleep 2; done'
          echo "Storage emulator ready"
          echo "Firebase emulators started (PID: $EMULATOR_PID)"

      - name: Rules unit tests (emulator)
        run: |
          set -o pipefail
          NO_COLOR=1 CI=1 FIRESTORE_EMULATOR_HOST=localhost:8080 \
            npx vitest run ".rules.test.ts" 2>&1 | tee rules-tests.log
          # Guard against green-by-skip: the rules suites self-skip (and still
          # report a passing skip-notice test) when FIRESTORE_EMULATOR_HOST is
          # not visible, so require a non-zero passed count AND zero skipped.
          summary=$(grep -E '^[[:space:]]*Tests[[:space:]]' rules-tests.log | tail -1)
          echo "Rules test summary: ${summary}"
          if [ -z "${summary}" ] \
            || ! echo "${summary}" | grep -qE '[1-9][0-9]* passed' \
            || echo "${summary}" | grep -q 'skipped'; then
            echo "Rules tests did not all execute (zero passed or some skipped) — failing."
            exit 1
          fi

      - name: Build & Preview (Vite)
        run: |
          if [ -f vite.config.ts ] || [ -f vite.config.js ]; then
            (npm run build || yarn build || pnpm build)
            (npm run preview &>/dev/null &) || (yarn preview &>/dev/null &) || (pnpm preview &>/dev/null &)
            npx wait-on http://localhost:4173
          fi
      - run: npx playwright test

      # ── Phase 5e-II Shoot-shell flag-ON lane ────────────────────────────
      # featureShootSurface is a BUILD-TIME flag (VITE_SHOOT_SURFACE, default
      # OFF). The full playwright run above is the FLAG-OFF contract — its
      # build never defines the flag, so every existing pin proves the
      # flag-off path is unchanged. The Shoot-shell E2E needs a flag-ON
      # bundle, so: rebuild with the flag, swap the preview server, and run
      # ONLY tests/shoot-shell.spec.ts (smoke discipline — 2 journeys).
      # SHOOT_SURFACE_E2E=1 lifts the spec's lane gate in
      # playwright.config.ts (it is excluded from the flag-OFF run, where
      # the shell cannot render). Global setup re-runs and re-seeds — the
      # lane starts from the same deterministic fixture as the main run.
      - name: Rebuild with VITE_SHOOT_SURFACE=1 (Shoot-shell flag-ON lane)
        env:
          VITE_SHOOT_SURFACE: 1
        run: |
          fuser -k 4173/tcp || true
          npm run build
          (npm run preview &>/dev/null &)
          npx wait-on http://localhost:4173
      - name: Shoot-shell E2E (flag-ON)
        env:
          SHOOT_SURFACE_E2E: 1
        run: npx playwright test tests/shoot-shell.spec.ts

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/**
